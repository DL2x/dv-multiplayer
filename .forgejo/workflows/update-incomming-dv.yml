name: Sync upstream alpha to incoming

on:
   schedule:
     - cron: "0 3 * * *"
   workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted

    steps:
      - name: Checkout work repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "forgejo-runner"
          git config user.email "runner@localhost"

      - name: Fetch upstream alpha
        run: |
          git remote add upstream https://github.com/AMacro/dv-multiplayer.git || true
          git fetch upstream alpha

      - name: Push alpha to incoming
        run: |
          git push origin FETCH_HEAD:refs/heads/incoming --force